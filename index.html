<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>유니원장 | 얼굴비대칭케어 전문</title>
  <meta name="description" content="간호사 출신 뷰티 전문가 유니원장 — 얼굴비대칭케어, 두피모발, 이어테라피, 워터테라피"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    a { text-decoration: none; color: inherit; }

    /* ── 배경 ── */
    body {
      font-family: 'Nunito', 'Noto Sans KR', sans-serif;
      background: #EEE9FF;
      color: #2D2055;
      min-height: 100vh;
      padding: 44px 20px 88px;
      position: relative;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* 배경 블롭 */
    .blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: drift 10s ease-in-out infinite alternate;
    }
    .blob-1 { width: 320px; height: 320px; background: radial-gradient(circle, rgba(180,140,255,.45), transparent 70%); top: -80px; right: -70px; animation-delay: 0s; }
    .blob-2 { width: 280px; height: 280px; background: radial-gradient(circle, rgba(255,160,210,.4), transparent 70%);  bottom: 80px; left: -50px; animation-delay: -4s; }
    .blob-3 { width: 180px; height: 180px; background: radial-gradient(circle, rgba(120,190,255,.35), transparent 70%); top: 42%; right: 0; animation-delay: -7s; }
    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(20px, 25px) scale(1.08); }
    }

    /* ── 컨테이너 ── */
    .container {
      max-width: 420px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      z-index: 1;
    }

    /* ── ① 프로필 ── */
    .profile {
      background: #FFFFFF;
      border-radius: 28px;
      padding: 36px 24px 30px;
      text-align: center;
      box-shadow:
        0 2px 4px rgba(100,60,200,.04),
        0 8px 24px rgba(100,60,200,.1),
        0 24px 48px rgba(100,60,200,.07);
    }

    .avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 18px;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #C4A8FF 0%, #FF9FD5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 600;
      color: rgba(255,255,255,.75);
      letter-spacing: .06em;
      box-shadow: 0 8px 28px rgba(160,100,255,.35);
      /* 사진 교체 시: background: url('사진파일.jpg') center/cover; */
    }

    /* 간호사 뱃지 */
    .credential {
      position: absolute;
      bottom: -2px;
      right: -4px;
      background: #FFFFFF;
      border-radius: 20px;
      padding: 3px 9px;
      font-size: 9px;
      font-weight: 700;
      color: #7B55CC;
      box-shadow: 0 2px 10px rgba(100,60,200,.2);
      white-space: nowrap;
      border: 1.5px solid #EDE8FF;
    }

    /* 서비스 태그 */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-bottom: 16px;
    }
    .tag {
      font-size: 9.5px;
      font-weight: 700;
      padding: 5px 13px;
      border-radius: 20px;
      letter-spacing: .01em;
    }
    .tag-purple { background: #EDE8FF; color: #7B55CC; }
    .tag-pink   { background: #FFE8F4; color: #CC5090; }
    .tag-blue   { background: #E8F4FF; color: #4070C8; }
    .tag-green  { background: #E8FFF2; color: #3A9060; }

    .profile-name {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -.03em;
      color: #2D2055;
      margin-bottom: 6px;
      line-height: 1;
    }

    .profile-en {
      font-size: 11px;
      font-weight: 400;
      color: #C0B0E0;
      letter-spacing: .1em;
      margin-bottom: 12px;
    }

    .profile-bio {
      font-size: 12px;
      font-weight: 300;
      color: #9080B8;
      line-height: 1.85;
      letter-spacing: .02em;
    }

    /* ── ② 카카오톡 CTA ── */
    .kakao-wrap { position: relative; }

    /* 펄스 링 */
    .kakao-wrap::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 24px;
      background: rgba(254,229,0,.4);
      animation: pulse 2.4s ease-out infinite;
      z-index: 0;
    }
    @keyframes pulse {
      0%   { transform: scale(1);    opacity: .7; }
      70%  { transform: scale(1.03); opacity: 0; }
      100% { transform: scale(1.03); opacity: 0; }
    }

    .kakao {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 22px;
      background: #FEE500;
      border-radius: 20px;
      box-shadow:
        0 4px 12px rgba(254,229,0,.3),
        0 12px 32px rgba(254,200,0,.25);
      transition: transform .22s ease, box-shadow .22s ease;
    }
    .kakao:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow:
        0 8px 20px rgba(254,229,0,.4),
        0 20px 48px rgba(254,200,0,.35);
    }
    .kakao:active { transform: translateY(-1px) scale(1); }

    .kakao-logo { width: 26px; height: 26px; flex-shrink: 0; }

    .kakao-copy { flex: 1; }
    .kakao-eyebrow {
      font-size: 9px;
      font-weight: 600;
      color: #1A1200;
      opacity: .5;
      letter-spacing: .1em;
      margin-bottom: 3px;
    }
    .kakao-title {
      font-size: 15px;
      font-weight: 800;
      color: #1A1200;
      letter-spacing: -.01em;
    }
    .kakao-arrow { font-size: 20px; color: #1A1200; opacity: .25; margin-left: auto; }

    /* ── ③ 무료 자료 ── */
    .resource {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px;
      background: #FFFFFF;
      border-radius: 20px;
      box-shadow:
        0 2px 4px rgba(100,60,200,.04),
        0 8px 24px rgba(100,60,200,.09);
      transition: transform .22s ease, box-shadow .22s ease;
    }
    .resource:hover {
      transform: translateY(-3px);
      box-shadow:
        0 4px 8px rgba(100,60,200,.06),
        0 16px 40px rgba(100,60,200,.14);
    }
    .resource:active { transform: translateY(-1px); }

    .res-icon-box {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #EDE8FF 0%, #FFE8F4 100%);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(160,100,255,.18);
    }

    .res-copy { flex: 1; }
    .res-eyebrow {
      font-size: 9px;
      font-weight: 700;
      color: #C080CC;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .res-title {
      font-size: 13.5px;
      font-weight: 600;
      color: #2D2055;
      line-height: 1.5;
      letter-spacing: -.01em;
    }
    .res-arrow { font-size: 18px; color: #C8B8E8; margin-left: auto; }

    /* ── ④ 링크 4개 ── */
    .links-section { display: flex; flex-direction: column; gap: 10px; }

    .links-eyebrow {
      font-size: 10px;
      font-weight: 700;
      color: #C0B0DC;
      letter-spacing: .12em;
      text-transform: uppercase;
      text-align: center;
    }

    .links-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .link-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 22px 12px;
      background: #FFFFFF;
      border-radius: 20px;
      box-shadow:
        0 2px 4px rgba(100,60,200,.04),
        0 6px 20px rgba(100,60,200,.08);
      transition: transform .22s ease, box-shadow .22s ease;
    }
    .link-card:hover {
      transform: translateY(-4px);
      box-shadow:
        0 4px 8px rgba(100,60,200,.06),
        0 14px 32px rgba(100,60,200,.14);
    }
    .link-card:active { transform: translateY(-1px); }

    .link-icon-box {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .ic-1 { background: linear-gradient(135deg, #FFE8D6, #FFD0B5); }
    .ic-2 { background: linear-gradient(135deg, #FFE0F0, #FFCCE4); }
    .ic-3 { background: linear-gradient(135deg, #D8F5E0, #B8ECC8); }
    .ic-4 { background: linear-gradient(135deg, #FFFAE0, #FFF0B0); }

    .link-label {
      font-size: 12px;
      font-weight: 700;
      color: #7060A8;
      letter-spacing: .01em;
    }

    /* ── 푸터 ── */
    .footer {
      text-align: center;
      padding-top: 10px;
      font-size: 10px;
      font-weight: 400;
      color: #C8B8E8;
      letter-spacing: .06em;
    }
  </style>
</head>
