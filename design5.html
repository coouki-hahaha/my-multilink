<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>05 — Luxury Spa</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+KR:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    a{text-decoration:none;color:inherit}
    body{font-family:'Noto Sans KR',sans-serif;background:#1A2E20;color:#EDE8DC;min-height:100vh;padding:0;font-weight:200}

    /* Header strip */
    .header-strip{background:#152518;padding:10px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(210,185,120,.15)}
    .hs-l{font-size:8.5px;letter-spacing:.22em;text-transform:uppercase;color:rgba(210,185,120,.5)}
    .hs-r{font-size:8.5px;letter-spacing:.1em;color:rgba(210,185,120,.3)}

    /* Profile */
    .profile{padding:44px 28px 36px;border-bottom:1px solid rgba(210,185,120,.15);text-align:center}
    .avatar-wrap{position:relative;display:inline-block;margin-bottom:24px}
    .avatar{width:80px;height:80px;border-radius:50%;background:#243C2A;border:1px solid rgba(210,185,120,.35);display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(210,185,120,.4);letter-spacing:.06em}
    .avatar-ring{position:absolute;inset:-5px;border-radius:50%;border:1px solid rgba(210,185,120,.15)}
    .name{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;letter-spacing:.08em;margin-bottom:4px;color:#EDE8DC}
    .name-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;font-weight:300;color:rgba(210,185,120,.6);margin-bottom:16px;letter-spacing:.06em}
    .bio{font-size:11px;font-weight:200;color:rgba(237,232,220,.45);line-height:2;letter-spacing:.08em}
    .rule{display:flex;align-items:center;gap:10px;margin:20px auto 0;max-width:120px}
    .rule-line{flex:1;height:.5px;background:rgba(210,185,120,.25)}
    .rule-gem{width:4px;height:4px;background:rgba(210,185,120,.5);transform:rotate(45deg)}

    /* Sections */
    .section{padding:0 28px}

    /* Kakao */
    .kakao-wrap{padding:24px 28px;border-bottom:1px solid rgba(210,185,120,.1)}
    .kakao{display:flex;align-items:center;gap:14px;padding:18px 20px;background:#FEE500;transition:opacity .2s}
    .kakao:hover{opacity:.92}
    .kakao svg{width:22px;height:22px;flex-shrink:0}
    .kakao-body{flex:1}
    .kakao-eye{font-size:8px;color:#1A1200;opacity:.5;letter-spacing:.16em;text-transform:uppercase;margin-bottom:4px}
    .kakao-ttl{font-size:13.5px;font-weight:400;color:#1A1200;letter-spacing:.04em}
    .kakao-arr{color:#1A1200;opacity:.3;font-size:14px}

    /* Resource */
    .res-wrap{padding:24px 28px;border-bottom:1px solid rgba(210,185,120,.1)}
    .resource{display:flex;align-items:center;gap:16px;transition:opacity .2s}
    .resource:hover{opacity:.7}
    .res-icon{font-size:20px;flex-shrink:0}
    .res-body{flex:1}
    .res-eye{font-size:8px;color:rgba(210,185,120,.6);letter-spacing:.18em;text-transform:uppercase;margin-bottom:5px}
    .res-ttl{font-size:12.5px;font-weight:300;color:rgba(237,232,220,.7);line-height:1.6}
    .res-arr{color:rgba(210,185,120,.25);font-size:13px}

    /* Links — elegant list */
    .links-wrap{padding:24px 28px}
    .links-head{font-size:8.5px;letter-spacing:.22em;text-transform:uppercase;color:rgba(210,185,120,.4);margin-bottom:16px}
    .link-row{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:.5px solid rgba(210,185,120,.1);transition:opacity .2s}
    .link-row:last-child{border-bottom:none}
    .link-row:hover{opacity:.6}
    .lr-icon{font-size:14px;flex-shrink:0;opacity:.7}
    .lr-name{font-size:12px;font-weight:300;color:rgba(237,232,220,.55);letter-spacing:.08em;flex:1}
    .lr-arr{font-size:11px;color:rgba(210,185,120,.25)}

    .footer{padding:12px 28px;font-size:8.5px;color:rgba(210,185,120,.2);letter-spacing:.12em;text-transform:uppercase;text-align:center;border-top:.5px solid rgba(210,185,120,.1)}
  </style>
</head>
<body>
  <div class="header-strip"><span class="hs-l">Uni Beauty Studio</span><span class="hs-r">Seoul</span></div>

  <div class="profile">
    <div class="avatar-wrap">
      <div class="avatar">[사진]</div>
      <div class="avatar-ring"></div>
    </div>
    <h1 class="name">유니원장</h1>
    <p class="name-sub">Uni · Beauty Expert</p>
    <p class="bio">간호사 출신 뷰티 전문가<br>얼굴비대칭 · 두피모발 · 이어&워터테라피</p>
    <div class="rule"><div class="rule-line"></div><div class="rule-gem"></div><div class="rule-line"></div></div>
  </div>

  <div class="kakao-wrap">
    <a href="[카카오톡 채널 URL]" class="kakao">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 3C6.477 3 2 6.686 2 11.2c0 2.88 1.74 5.41 4.38 6.97l-.99 3.63a.3.3 0 0 0 .45.33l4.41-2.91c.57.07 1.15.1 1.75.1 5.523 0 10-3.686 10-8.2C22 6.686 17.523 3 12 3Z" fill="#1A1200"/></svg>
      <div class="kakao-body"><div class="kakao-eye">무료 상담 · 예약 문의</div><div class="kakao-ttl">카카오톡 채널로 연결하기</div></div>
      <span class="kakao-arr">→</span>
    </a>
  </div>

  <div class="res-wrap">
    <a href="[무료 자료 URL]" class="resource">
      <div class="res-icon">📋</div>
      <div class="res-body"><div class="res-eye">Free Download</div><div class="res-ttl">[무료 자료 제목]<br>지금 바로 받아보세요</div></div>
      <span class="res-arr">→</span>
    </a>
  </div>

  <div class="links-wrap">
    <div class="links-head">더 알아보기</div>
    <a href="[블로그 URL]" class="link-row"><span class="lr-icon">✍️</span><span class="lr-name">블로그</span><span class="lr-arr">→</span></a>
    <a href="[인스타그램 URL]" class="link-row"><span class="lr-icon">📷</span><span class="lr-name">인스타그램</span><span class="lr-arr">→</span></a>
    <a href="[유튜브 URL]" class="link-row"><span class="lr-icon">▶️</span><span class="lr-name">유튜브</span><span class="lr-arr">→</span></a>
    <a href="[후기 URL]" class="link-row"><span class="lr-icon">⭐</span><span class="lr-name">고객 후기</span><span class="lr-arr">→</span></a>
  </div>

  <div class="footer">© 2026 유니원장</div>
</body></html>
